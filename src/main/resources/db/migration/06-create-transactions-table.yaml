databaseChangeLog:
  - changeSet:
      id: 06-create-transactions-table
      author: "Зайцев Тимофей"
      preConditions:
        - onFail: HALT
        - not:
            - tableExists:
                tableName: transactions
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_card_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transactions_from_card
                    references: cards(id)
              - column:
                  name: to_card_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transactions_to_card
                    references: cards(id)
              - column:
                  name: amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP